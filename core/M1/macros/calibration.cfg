[gcode_macro CALIBRATE_HEATING_HOTEND]
description: "Calibrate the tuning of the hotend for more accurate temperature control"
gcode:
    #todo add check to see if ehater block temp is close to ambient
    #todo check if toolehad is attatched
    #todo add info modal for user
    #Use delta required for more accurate sensor responsivness measurement
    MPC_CALIBRATE HEATER=extruder USE_DELTA=1 TARGET=200 FAN_BREAKPOINTS=6


[gcode_macro CALIBRATE_HEATING_BED]
description: "Calibrate the tuning of the bed for more accurate temperature control"
gcode:
    #todo add check to see if heater bed temp is close to ambient
    #todo check if bed is attatched
    #todo move axes into correct positioning for fan to impinge bed
    #todo add info modal for user
    #Use delta required for more accurate sensor responsivness measurement
    MPC_CALIBRATE HEATER=heater_bed USE_DELTA=1 TARGET=90 FAN_BREAKPOINTS=6

[gcode_macro PROBE_CALIBRATE]
rename_existing: PROBE_CALIBRATE_
gcode:
    CALIBRATE_PROBE

[gcode_macro CALIBRATE_PROBE]
description: "Calibrate the Probes Z Offset"
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Probe Calibrate"
    # 2) Ask for confirmation
    RESPOND TYPE=command MSG="action:prompt_text Please fetch a piece of paper to perform Probe Z Offset Calibration"
    
    # 3) Footer buttons: Unload (primary) / Cancel (error)
    RESPOND TYPE=command MSG="action:prompt_footer_button I Have Paper, Continue|_DO_CALIBRATE_PROBE|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Help|_HELP_CALIBRATE_PROBE|info"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CLOSE_CALIBRATE_PROBE|error"
    # 4) Show the prompt
    RESPOND TYPE=command MSG="action:prompt_show"
    #TODO CHECK IF BED IS INSTALLED
    G28 O
    G90
    G1 X100 Y100

[gcode_macro _CLOSE_CALIBRATE_PROBE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro _HELP_CALIBRATE_PROBE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin How to Calibrate the Probe"
    # 2) Ask for confirmation
    RESPOND TYPE=command MSG="action:prompt_text 1) Ensure the nozzle is clear of any debris"
    # TODO WIPE NOZZLE
    RESPOND TYPE=command MSG="action:prompt_text 2) Place the paper between the nozzle and the bed"
    RESPOND TYPE=command MSG="action:prompt_text 3) Lower the nozzle using the on screen buttons until it just catches the bed between the bed and nozzle"
    # 3) Footer buttons: Unload (primary) / Cancel (error)
    RESPOND TYPE=command MSG="action:prompt_footer_button I Have Paper, Continue|_DO_CALIBRATE_PROBE|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CLOSE_CALIBRATE_PROBE|error"
    # 4) Show the prompt
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _DO_CALIBRATE_PROBE]
gcode:
    _CLOSE_CALIBRATE_PROBE
    PROBE_CALIBRATE_

[gcode_macro FINETUNE_RESONANCE]
variable_has_run: 0
description: Sweep ±5 Hz around current input shaper freqs—but only once per power-cycle
gcode:

    {% set already = printer["gcode_macro FINETUNE_RESONANCE"].has_run|int %}
    {% if already == 0 %}
        # --- first run: do the calibration sweep ---
        {% set fx = printer.configfile.settings.input_shaper.shaper_freq_x|default(55)|float %}
        {% set fy = printer.configfile.settings.input_shaper.shaper_freq_y|default(80)|float %}

        SHAPER_CALIBRATE AXIS=x FREQ_START={fx - 5} FREQ_END={fx + 5} HZ_PER_SEC=2
        SHAPER_CALIBRATE AXIS=y FREQ_START={fy - 5} FREQ_END={fy + 5} HZ_PER_SEC=2
        #SHAPER_CALIBRATE FREQ_START_X={fx - 5} FREQ_END_X={fx + 5} FREQ_START_Y={fy - 5} FREQ_END_Y={fy + 5} HZ_PER_SEC=2
        
        # mark that we’ve run once
        SET_GCODE_VARIABLE MACRO=FINETUNE_RESONANCE VARIABLE=has_run VALUE=1
    {% else %}
    # --- subsequent calls skip ---
        M118 FINETUNE_RESONANCE already run this session, skipping
    {% endif %}