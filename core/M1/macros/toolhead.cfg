[gcode_macro NOZZLE_WIPE_CYCLE]
description: Rectangle wipe. SETUP=1 plunges once; SETUP=0 keeps current Z (stay in brush).
gcode:
  {% set xc     = params.X|default(100)|float %}
  {% set yc     = params.Y|default(14.0)|float %}
  {% set z_top  = params.Z_TOP|default(3.5)|float %}
  {% set plunge = params.PLUNGE|default(1.0)|float %}
  {% set sx     = params.SX|default(9.0)|float %}
  {% set sy     = params.SY|default(2)|float %}
  {% set passes = params.PASSES|default(5)|int %}
  {% set f_travel = params.F_TRAVEL|default(7800)|float %}
  {% set f_wipe   = params.F_WIPE|default(2000)|float %}
  {% set z_speed  = params.Z_SPEED|default(200)|float %}

  {% set setup = params.SETUP|default(0)|int %}           ; 1=do Z_TOP+plunge, 0=no Z moves (continuous)
  {% set finish_at_edge = params.FINISH_AT_EDGE|default(1)|int %}  ; 1=bottom-mid, 0=center

  {% set x_min0 = xc - sx/2.0 %}
  {% set x_max0 = xc + sx/2.0 %}
  {% set y_min0 = yc - sy/2.0 %}
  {% set y_max0 = yc + sy/2.0 %}
  {% set z_wipe = z_top - plunge %}

  SAVE_GCODE_STATE NAME=nozzle_wipe_cycle_state
  G90

  {% if setup == 1 %}
    ; Move to center, go to Z_TOP, plunge ONCE, then go to start edge
    G0 X{xc} Y{yc} F{f_travel}
    G0 Z{z_top} F{z_speed}
    G1 Z{z_wipe} F{z_speed}
    G1 X{xc} Y{y_min0} F{f_wipe}
  {% else %}
    ; Continuous mode: do not touch Z, just make sure we're at the start edge
    G1 X{xc} Y{y_min0} F{f_wipe}
  {% endif %}

  ; Trace rectangle PASSES times (stays at current Z)
  {% for i in range(passes) %}
    G1 X{x_max0} Y{y_min0} F{f_wipe}
    G1 X{x_max0} Y{y_max0} F{f_wipe}
    G1 X{x_min0} Y{y_max0} F{f_wipe}
    G1 X{x_min0} Y{y_min0} F{f_wipe}
    G1 X{xc}     Y{y_min0} F{f_wipe}
  {% endfor %}

  {% if finish_at_edge == 0 %}
    G1 X{xc} Y{yc} F{f_wipe}
  {% else %}
    G1 X{xc} Y{y_min0} F{f_wipe}
  {% endif %}

  RESTORE_GCODE_STATE NAME=nozzle_wipe_cycle_state MOVE=0




[gcode_macro NOZZLE_WIPE_SMART]
recursion_limit: 200
description: Smart wipe using recursive macro loop (requires recursion allowed)
variable_active: 0
variable_phase: "IDLE"
variable_iter: 0

; stored params
variable_extruder: "extruder"
variable_xc: 100.0
variable_yc: 14.0
variable_z_top: 3.5
variable_plunge: 1.0
variable_sx: 9.0
variable_sy: 2.0
variable_passes: 5
variable_f_travel: 7800.0
variable_f_wipe: 2000.0
variable_z_speed: 200.0
variable_z_hop: 5.0

variable_start_temp: 170.0
variable_wipe_temp: 200.0
variable_wipe_temp_tolerance: 5.0
variable_stop_temp: 160.0
variable_fan_off_temp: 150.0
variable_fan_pct: 0.15

variable_poll_ms: 250
variable_max_iter: 2000

gcode:
  {% set phase = params.PHASE|default("INIT")|upper %}
  {% set m = printer["gcode_macro NOZZLE_WIPE_SMART"] %}

  ; -------- INIT --------
  {% if phase == "INIT" %}
    {% if 'x' not in printer.toolhead.homed_axes or 'y' not in printer.toolhead.homed_axes or 'z' not in printer.toolhead.homed_axes %}
      {action_raise_error("NOZZLE_WIPE_SMART: Please home XYZ first (G28).")}
    {% endif %}

    {% set xc     = params.X|default(100)|float %}
    {% set yc     = params.Y|default(14.0)|float %}
    {% set z_top  = params.Z_TOP|default(3.5)|float %}
    {% set plunge = params.PLUNGE|default(1.0)|float %}
    {% set sx     = params.SX|default(9.0)|float %}
    {% set sy     = params.SY|default(2.0)|float %}
    {% set passes = params.PASSES|default(5)|int %}
    {% set f_travel = params.F_TRAVEL|default(7800)|float %}
    {% set f_wipe   = params.F_WIPE|default(2000)|float %}
    {% set z_speed  = params.Z_SPEED|default(200)|float %}
    {% set z_hop    = params.Z_HOP|default(5.0)|float %}

    {% set start_temp   = params.START_TEMP|default(170)|float %}
    {% set wipe_temp    = params.WIPE_TEMP|default(200)|float %}
    {% set wipe_temp_tol = params.WIPE_TEMP_TOL|default(5.0)|float %}
    {% set stop_temp    = params.STOP_TEMP|default(160)|float %}
    {% set fan_off_temp = params.FAN_OFF_TEMP|default(150)|float %}
    {% set fan_pct      = params.FAN_PCT|default(0.15)|float %}
    {% set poll_ms      = params.POLL_MS|default(250)|int %}
    {% set max_iter     = params.MAX_ITER|default(2000)|int %}

    {% if start_temp > wipe_temp %}
      {action_raise_error("NOZZLE_WIPE_SMART: START_TEMP must be <= WIPE_TEMP")}
    {% endif %}
    {% if stop_temp >= wipe_temp %}
      {action_raise_error("NOZZLE_WIPE_SMART: STOP_TEMP should be < WIPE_TEMP")}
    {% endif %}
    {% if wipe_temp_tol < 0 %}
      {action_raise_error("NOZZLE_WIPE_SMART: WIPE_TEMP_TOL must be >= 0")}
    {% endif %}
    {% if max_iter < 10 %}
      {action_raise_error("NOZZLE_WIPE_SMART: MAX_ITER too small")}
    {% endif %}

    {% if fan_pct < 0 %}{% set fan_pct = 0.0 %}{% endif %}
    {% if fan_pct > 1 %}{% set fan_pct = 1.0 %}{% endif %}
    {% set fan_s = (fan_pct * 255.0)|int %}
    {% set z_safe = z_top + z_hop %}

    ; persist
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=active VALUE=1
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=phase VALUE='"HEAT_WAIT"'
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=iter VALUE=0
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=max_iter VALUE={max_iter}

    {% set exname = printer.toolhead.extruder %}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=extruder VALUE='"{exname}"'

    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=xc VALUE={xc}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=yc VALUE={yc}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=z_top VALUE={z_top}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=plunge VALUE={plunge}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=sx VALUE={sx}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=sy VALUE={sy}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=passes VALUE={passes}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=f_travel VALUE={f_travel}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=f_wipe VALUE={f_wipe}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=z_speed VALUE={z_speed}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=z_hop VALUE={z_hop}

    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=start_temp VALUE={start_temp}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=wipe_temp VALUE={wipe_temp}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=wipe_temp_tolerance VALUE={wipe_temp_tol}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=stop_temp VALUE={stop_temp}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=fan_off_temp VALUE={fan_off_temp}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=fan_pct VALUE={fan_pct}
    SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=poll_ms VALUE={poll_ms}

    ; start heater + fan immediately
    M106 S{fan_s}
    M104 S{wipe_temp}

    ; move while heating, park above plunge
    SAVE_GCODE_STATE NAME=nozzle_wipe_smart_init_state
    G90
    G0 Z{z_safe} F{f_travel}
    G0 X{xc} Y{yc} F{f_travel}
    G0 Z{z_top} F{z_speed}
    RESTORE_GCODE_STATE NAME=nozzle_wipe_smart_init_state MOVE=0
    M400

    {action_respond_info("NOZZLE_WIPE_SMART: parked; heating to wipe temp")}

    ; enter tick loop
    NOZZLE_WIPE_SMART PHASE=TICK

  ; -------- TICK --------
  {% else %}
    {% if m.active|int == 0 %}
      {action_respond_info("NOZZLE_WIPE_SMART: inactive, exiting.")}
    {% else %}

      {% if m.iter|int >= m.max_iter|int %}
        SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=active VALUE=0
        M104 S0
        M106 S0
        {action_raise_error("NOZZLE_WIPE_SMART: MAX_ITER reached; aborting")}
      {% endif %}

      SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=iter VALUE={m.iter|int + 1}

      {% set ex = printer[m.extruder] %}
      {% set t = ex.temperature|float %}
      {% set fan_s = (m.fan_pct|float * 255.0)|int %}
      M106 S{fan_s}

      {% set wipe_threshold = (m.wipe_temp|float - m.wipe_temp_tolerance|float) %}

      {% if m.phase == "HEAT_WAIT" %}
        {% if t >= m.start_temp|float %}
          ; One-time plunge/setup as we enter wiping
          NOZZLE_WIPE_CYCLE X={m.xc} Y={m.yc} Z_TOP={m.z_top} PLUNGE={m.plunge} SX={m.sx} SY={m.sy} PASSES=1 F_TRAVEL={m.f_travel} F_WIPE={m.f_wipe} Z_SPEED={m.z_speed} SETUP=1 FINISH_AT_EDGE=1
          M400
          SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=phase VALUE='"HEAT_WIPE"'
          {action_respond_info("NOZZLE_WIPE_SMART: start wiping")}
        {% else %}
          G4 P{m.poll_ms|int}
        {% endif %}

      {% elif m.phase == "HEAT_WIPE" %}
        ; If already at/above threshold, don't do an extra wipe cycle
        {% if t >= wipe_threshold %}
          M104 S0
          SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=phase VALUE='"COOL_WIPE"'
          {action_respond_info("NOZZLE_WIPE_SMART: reached wipe threshold; heater off")}
        {% else %}
          ; Continuous wipe: SETUP=0 => no Z moves (stays in brush)
          NOZZLE_WIPE_CYCLE X={m.xc} Y={m.yc} Z_TOP={m.z_top} PLUNGE={m.plunge} SX={m.sx} SY={m.sy} PASSES={m.passes} F_TRAVEL={m.f_travel} F_WIPE={m.f_wipe} Z_SPEED={m.z_speed} SETUP=0 FINISH_AT_EDGE=1
          M400
        {% endif %}

      {% elif m.phase == "COOL_WIPE" %}
        ; If already cooled enough, stop immediately (no extra cycle)
        {% if t <= m.stop_temp|float %}
          {% set z_safe = (m.z_top|float) + (m.z_hop|float) %}
          SAVE_GCODE_STATE NAME=nozzle_wipe_smart_lift_state
          G90
          G0 Z{z_safe} F{m.z_speed}
          RESTORE_GCODE_STATE NAME=nozzle_wipe_smart_lift_state MOVE=0
          M400
          SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=phase VALUE='"FAN_COOL"'
          {action_respond_info("NOZZLE_WIPE_SMART: stop wiping; fan cool")}
        {% else %}
          NOZZLE_WIPE_CYCLE X={m.xc} Y={m.yc} Z_TOP={m.z_top} PLUNGE={m.plunge} SX={m.sx} SY={m.sy} PASSES={m.passes} F_TRAVEL={m.f_travel} F_WIPE={m.f_wipe} Z_SPEED={m.z_speed} SETUP=0 FINISH_AT_EDGE=1
          M400
        {% endif %}

      {% elif m.phase == "FAN_COOL" %}
        {% if t <= m.fan_off_temp|float %}
          M106 S0
          SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=active VALUE=0
          SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=phase VALUE='"IDLE"'
          {action_respond_info("NOZZLE_WIPE_SMART: done; fan off")}
        {% else %}
          G4 P{m.poll_ms|int}
        {% endif %}

      {% else %}
        SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=active VALUE=0
        M104 S0
        M106 S0
        {action_raise_error("NOZZLE_WIPE_SMART: unknown phase")}
      {% endif %}

      ; continue ticking if still active
      {% if printer["gcode_macro NOZZLE_WIPE_SMART"].active|int == 1 %}
        NOZZLE_WIPE_SMART PHASE=TICK
      {% endif %}

    {% endif %}
  {% endif %}





[gcode_macro NOZZLE_WIPE_SMART_STOP]
description: Stop smart wiping (heater off, fan off, exit next tick)
gcode:
  SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=active VALUE=0
  SET_GCODE_VARIABLE MACRO=NOZZLE_WIPE_SMART VARIABLE=phase VALUE='"IDLE"'
  M104 S0
  M106 S0
  {action_respond_info("NOZZLE_WIPE_SMART: stop requested")}