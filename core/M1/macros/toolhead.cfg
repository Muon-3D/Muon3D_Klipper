[gcode_macro TOOLHEAD_CONNECT]
description: Called when toolhead is reconnected with the umbilical
gcode:
    {% set last = printer["gcode_macro TOOLHEAD_DISCONNECT"].last_partfan_s|int %}
    {% if last > 0 %}
        M106 S{last}
    {% endif  %}

    M104 S0

    {% if printer["filament_switch_sensor filament_sensor_toolhead"].filament_detected %}
      LOAD_FILAMENT
    {% endif %}


[gcode_macro TOOLHEAD_DISCONNECT]
description: Called when toolhead is disconnected with the umbilical
variable_last_partfan_s: 0
gcode:
    {% set cur = (printer.fan.speed * 255)|int %}
    SET_GCODE_VARIABLE MACRO=TOOLHEAD_DISCONNECT VARIABLE=last_partfan_s VALUE={cur}
    # Turn fan off
    M106 S0
    M104 S0

    # Optional: pause if printing
    {% if printer.print_stats.state == "printing" %}
        PAUSE
    {% endif %}


[gcode_macro TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_PRESSED]
description: Unlock press: retract, disable extruder stepper if enabled, turn off heater if heating
variable_e_was_enabled: 0
variable_saved_hotend_target: 0.0
variable_changed_hotend_target: 0
gcode:
    ; Choose which stepper to disable (default: extruder)
    {% set e_stepper = params.E_STEPPER|default("extruder") %}

    ; Retract to reduce load
    FORCE_MOVE STEPPER=extruder DISTANCE=-16 VELOCITY=100 ACCEL=2000

    ; Record whether extruder stepper was enabled, then disable it
    {% set e_enabled = 1 if printer.stepper_enable.steppers[e_stepper] else 0 %}
    SET_GCODE_VARIABLE MACRO=TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_PRESSED VARIABLE=e_was_enabled VALUE={e_enabled}
    {% if e_enabled == 1 %}
      SET_STEPPER_ENABLE STEPPER={e_stepper} ENABLE=0
    {% endif %}

    ; Save current hotend target and turn it off (only if it was heating)
    {% set tgt = printer.extruder.target|float %}
    SET_GCODE_VARIABLE MACRO=TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_PRESSED VARIABLE=saved_hotend_target VALUE={tgt}
    {% if tgt > 0 %}
      M104 S0
      SET_GCODE_VARIABLE MACRO=TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_PRESSED VARIABLE=changed_hotend_target VALUE=1
    {% else %}
      SET_GCODE_VARIABLE MACRO=TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_PRESSED VARIABLE=changed_hotend_target VALUE=0
    {% endif %}

    {action_respond_info("Unlock press: retract done; extruder stepper disabled if it was enabled; heater off if it was heating.")}


[gcode_macro TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_RELEASED]
description: Unlock release: restore extruder stepper/heater only if we changed them
gcode:
    {% set e_stepper = params.E_STEPPER|default("extruder") %}
    {% set m = printer["gcode_macro TOOLHEAD_UMBILICAL_UNLOCK_BUTTON_PRESSED"] %}

    ; Restore extruder stepper only if we disabled it
    {% if m.e_was_enabled|int == 1 %}
      SET_STEPPER_ENABLE STEPPER={e_stepper} ENABLE=1
    {% endif %}

    ; Restore heater target only if we changed it
    {% if m.changed_hotend_target|int == 1 %}
      M104 S{m.saved_hotend_target|float}
    {% endif %}

    {action_respond_info("Unlock release: restored extruder stepper/heater where applicable.")}
