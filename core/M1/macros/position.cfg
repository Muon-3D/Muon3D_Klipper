
#####################################################################
#   Position Macros
#####################################################################

[gcode_macro CENTER]
description: Moves the toolhead to the center
gcode:
    G28 X Y
    {% set x_center = (printer.toolhead.axis_maximum.x|float + printer.toolhead.axis_minimum.x|float) / 2.0 %}
    {% set y_center = (printer.toolhead.axis_maximum.y|float + printer.toolhead.axis_minimum.y|float) / 2.0 %}
    G90
    G1 X{x_center} Y{y_center} F7800


[gcode_macro FRONT]
description: Moves the toolhead to the front
gcode:
    G28 X Y
    {% set x_center = (printer.toolhead.axis_maximum.x|float + printer.toolhead.axis_minimum.x|float) / 2.0 %}
    {% set y_front = printer.toolhead.axis_maximum.y|float - 10 %}
    G90
    G1 X{x_center} Y{y_front} F7800



[gcode_macro Z_PARK]
description: Moves the toolhead to the top for stowing
gcode:

    {% set HA = printer.toolhead.homed_axes|default("") %}

    {% if 'z' in HA %}
        ; Z is homed → safe absolute move
        SAVE_GCODE_STATE NAME=_z_move_150_state
        G90
        G0 Z140 F{params.Z_SPEED|default(600)|float}
        RESTORE_GCODE_STATE NAME=_z_move_150_state MOVE=0
    {% else %}
        ; Z not homed → use parking routine
        AXIS_HOME_MOVE AXIS=Z
    {% endif %}

[gcode_macro PARK_PRINTER]
description: Moves the toolhead to end of print position - run after filament cut
gcode:
    {% set HA = printer.toolhead.homed_axes|default("") %}
    {% set z_homed = 'z' in HA %}
    
    Z_PARK

    {% if not ('x' in HA and 'y' in HA) %}
        G28 X Y
    {% endif %}

    {% if not z_homed %}
        SET_KINEMATIC_POSITION SET_HOMED=Z Z=50
    {% endif %}

    G0 X135 Y63 F4800

    {% if not z_homed %}
        SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
    {% endif %}

    M18 #Motors off

[gcode_macro ANTI_OOZE_NOZZLE_DOCK]
gcode:
    G90
    G0 Y14.0 Z5.0 F7800
    G0 X100.0 F7800
    G0 Z3 F200 #PLACE NOZLE IN SILICONE BRSH TO LIMIT OOZING
