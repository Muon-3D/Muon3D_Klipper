#####################################################################
#   Print Macros
#####################################################################

[gcode_macro PRINT_START]
description: print startup sequence
gcode:
    {% set BED_TEMP = params.BED|default(65)|float %}
    {% set BED_TEMP_NOZZLE_WIPE = [BED_TEMP, 65] | min %} #cant handle more than this bed temp or else fan cools bed thermistor and causes nusuance error
    {% set READY_TEMP = BED_TEMP - 10 %}
    {% set PREHEAT_EXTRUDER_TEMP = 135 %} #ENSURE NO OOZE
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(190)|float %}
    {% set MATERIAL = params.MATERIAL | upper %}

    _SET_MPC_MATERIAL MATERIAL={MATERIAL}

    SAVE_GCODE_STATE NAME=STATE_PRINT_START

    BED_MESH_PROFILE LOAD=default #WILL RECLAIBRATE LATER, JUST APPLIES THE PROFILE FOR ANY MOVEMENTS

    #LED_PENDING
    ;PCF_CHECK                          ; test part cooling fan, disable for fans without tachometer
    M107                                ; turn off part fan
    M140 S{BED_TEMP_NOZZLE_WIPE}                    ; set bed temperature

    G28 PARK=0                                    ; home all
    NOZZLE_WIPE_SMART
    M140 S{BED_TEMP}
    G28 Z PARK0 X_OFFSET-5     ;x OFFSET HERE PREVENT ANY BLOBS FROM INTIAL PROBING FROM INTERFERING WITH THE PROBING
    # BED_TILT_CALIBRATE
    M104 S{PREHEAT_EXTRUDER_TEMP}
    FINETUNE_RESONANCE

    IF_BED_TEMP_ANTI_OOZE_NOZZLE_DOCK TEMP={READY_TEMP}

    TEMPERATURE_WAIT SENSOR="heater_bed" MINIMUM={READY_TEMP}   ; wait for bed to mostly heat up, limiting ooze

    G91
    G0 Z10 F200  #LIFT OFF NOZZLE BRUSH
    G90
    G0 Y60 F7800 #MOVE TO MIDDLE TO RPEVENT NOZLE IMPACT WITH BED BLOCK, READY FOR PRINT BED MESH

    #Wait for bed to warm before adaptive mesh
    {% if params.MESH_MIN is defined and params.MESH_MAX is defined %}

      # Parse slicer-passed bounds (these come in as "x,y")
      {% set _min_in = params.MESH_MIN.split(',') %}
      {% set _max_in = params.MESH_MAX.split(',') %}
      {% set in_min_x = _min_in[0]|float %}
      {% set in_min_y = _min_in[1]|float %}
      {% set in_max_x = _max_in[0]|float %}
      {% set in_max_y = _max_in[1]|float %}

      # Read [bed_mesh] limits from printer.cfg
      # Depending on Klipper version, these may be a tuple/list (x,y) OR a string "x,y"
      {% set cfg_min_raw = printer.configfile.settings['bed_mesh']['mesh_min'] %}
      {% set cfg_max_raw = printer.configfile.settings['bed_mesh']['mesh_max'] %}

      {% if cfg_min_raw is string %}
          {% set _cfg_min = cfg_min_raw.split(',') %}
          {% set cfg_min_x = _cfg_min[0]|float %}
          {% set cfg_min_y = _cfg_min[1]|float %}
      {% else %}
          {% set cfg_min_x = cfg_min_raw[0]|float %}
          {% set cfg_min_y = cfg_min_raw[1]|float %}
      {% endif %}

      {% if cfg_max_raw is string %}
          {% set _cfg_max = cfg_max_raw.split(',') %}
          {% set cfg_max_x = _cfg_max[0]|float %}
          {% set cfg_max_y = _cfg_max[1]|float %}
      {% else %}
          {% set cfg_max_x = cfg_max_raw[0]|float %}
          {% set cfg_max_y = cfg_max_raw[1]|float %}
      {% endif %}

      # Clamp slicer bounds to cfg bounds
      {% set mesh_min_x = [ [in_min_x, cfg_min_x] | max, cfg_max_x ] | min %}
      {% set mesh_min_y = [ [in_min_y, cfg_min_y] | max, cfg_max_y ] | min %}
      {% set mesh_max_x = [ [in_max_x, cfg_min_x] | max, cfg_max_x ] | min %}
      {% set mesh_max_y = [ [in_max_y, cfg_min_y] | max, cfg_max_y ] | min %}

      # Ensure min <= max
      {% if mesh_max_x < mesh_min_x %}
          {% set _t = mesh_min_x %}{% set mesh_min_x = mesh_max_x %}{% set mesh_max_x = _t %}
      {% endif %}
      {% if mesh_max_y < mesh_min_y %}
          {% set _t = mesh_min_y %}{% set mesh_min_y = mesh_max_y %}{% set mesh_max_y = _t %}
      {% endif %}

      # Compute probe counts:
      {% set width_x = mesh_max_x - mesh_min_x %}
      {% set depth_y = mesh_max_y - mesh_min_y %}
      {% set step = 37.9 %}
      {% set eps = 0.0001 %}

      # required points = ceil(L/step) + 1 #
      {% set pc_x = (((width_x + step - eps) / step) | int) + 1 %}
      {% set pc_y = (((depth_y + step - eps) / step) | int) + 1 %}

      # clamp to minimum 3 #
      {% if pc_x < 3 %}
        {% set pc_x = 3 %}
      {% endif %}
      {% if pc_y < 3 %}
        {% set pc_y = 3 %}
      {% endif %}

      {% if pc_x > 6 %}
        {% set pc_x = 6 %}
      {% endif %}
      {% if pc_y > 5 %}
        {% set pc_y = 5 %}
      {% endif %}

      
      {% set algo = params.ALGORITHM|default("bicubic") %}

      BED_MESH_CLEAR
      BED_MESH_CALIBRATE MESH_MIN={mesh_min_x},{mesh_min_y} MESH_MAX={mesh_max_x},{mesh_max_y} PROBE_COUNT={pc_x},{pc_y} ALGORITHM={algo} ADAPTIVE=0 ADAPTIVE_MARGIN=0
    {% else %}
      BED_MESH_CLEAR
      BED_MESH_CALIBRATE
    {% endif %}
    SAVE_CONFIG NO_RESTART=1 #permanently saves resonances and bed mesh, important for finetune resonances


    ANTI_OOZE_NOZZLE_DOCK

    M104 S{EXTRUDER_TEMP}
    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={180}   
    G1 E-1.0 F300 #RETRACT to limit ooze

    M109 S{EXTRUDER_TEMP}               ; set and wait for hot end temperature
    M190 S{BED_TEMP}                    ; wait for bed temperature
    # NOZZLE_UNDOCK                       ; undock the nozzle 

    G91
    G0 Z10 F200  #LIFT OFF NOZZLE BRUSH

    G90                                 ; use absolute coordinates
    G0 X130.0 Y2.0 F7800 #MOVE TO SIDE TO RPEVENT NOZLE IMPACT WITH BED BLOCK, READY FOR PRINT START PURGE
    
    RESTORE_GCODE_STATE NAME=STATE_PRINT_START

    {% set zoff = printer.configfile.settings.load_cell_probe.z_offset|float %}
    SET_GCODE_OFFSET Z={zoff}

    
    G1 E1.0 F300 #UNRETRACT

    #LED_WORKING
    # NOZZLE_PURGE #do nozzle purge in slicer


[gcode_macro IF_BED_TEMP_ANTI_OOZE_NOZZLE_DOCK]
description: Dock nozzle only if current bed temp is below TEMP (anti-ooze)
gcode:
    {% set threshold = params.TEMP|float %}
    {% set bed_now = printer.heater_bed.temperature|float %}

    {% if bed_now < threshold %}
        ANTI_OOZE_NOZZLE_DOCK
    {% endif %}

