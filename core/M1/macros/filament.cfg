#####################################################################
#   Filament Macros with UI Prompts
#####################################################################

# ┌───────────────────────────────────────────────────────────────────┐
# │  1) UNLOAD FLOW                                                    │
# │     • M600_PROMPT: Ask user if they want to pause & unload.       │
# │     • M600_DO_UNLOAD: Closes prompt, pauses, and runs unload.     │
# │     • UNLOAD_FILAMENT: Actual unload sequence (as before).        │
# └───────────────────────────────────────────────────────────────────┘

[gcode_macro M600]
description: Prompt user to pause print and unload filament
gcode:
    PAUSE

    # 1) Open a dialog titled “Unload Filament”
    RESPOND TYPE=command MSG="action:prompt_begin Unload Filament"
    # 2) Ask for confirmation
    RESPOND TYPE=command MSG="action:prompt_text Do you want to pause the print and unload the filament?"
    # 3) Footer buttons: Unload (primary) / Cancel (error)
    RESPOND TYPE=command MSG="action:prompt_footer_button Unload|_DO_UNLOAD_M600|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CANCEL_M600|error"
    # 4) Show the prompt
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CANCEL_M600]
description: (called by M600) pause, notify, and unload filament
gcode:
    # 1) Close any open prompt
    RESPOND TYPE=command MSG="action:prompt_end"
    RESUME

[gcode_macro _DO_UNLOAD_M600]
description: (called by M600_PROMPT) pause, notify, and unload filament
gcode:
    # 1) Close any open prompt
    RESPOND TYPE=command MSG="action:prompt_end"
    # 2) Pause the print

    # 3) Inform the user
    RESPOND MSG="Unloading filament, reload before resuming"
    # 4) Run the actual unload routine
    UNLOAD_FILAMENT

    LOAD_FILAMENT_PROMPT


[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from toolhead. EXTRUDER_TEMP defaults to 210 if hotend is cold
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(250)|int %}
    {% set MIN_TEMP = EXTRUDER_TEMP|float * 0.96 %}
    {% set CURRENT_TARGET = printer.extruder.target|float %}
    SAVE_GCODE_STATE NAME=UNLOAD_FILAMENT
    #G28 XY
    #G91                         ; relative positioning
    #G1 Z20                      ; move nozzle upwards
    #FRONT                       ; move the toolhead to the front

    {% if EXTRUDER_TEMP != 0 %}
        # LED_PENDING
        {% if CURRENT_TARGET < EXTRUDER_TEMP %}
            M104 S{EXTRUDER_TEMP} ; only heat up if the current extruder is not already hot
        {% endif %}
        TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={MIN_TEMP} ; wait for min extrude temp
    {% endif %}
    
    LED_PRINTING
    
    M83                         ; set extruder to relative mode
    G1 E10 F300                 ; extrude a little to soften tip
    G1 E-30 F3600               ; quickly retract a small amount to eliminate stringing
    G4 P200                     ; pause for a short amount of time
    G1 E-40 F1200              ; retract slowly the rest of the way
    M400                        ; wait for moves to finish
    M104 S{0}
    RESTORE_GCODE_STATE NAME=UNLOAD_FILAMENT
    M300 P400                   ; long beep to indicate unload complete
    M117 Unload Complete!
    
    LED_INFO





[gcode_macro FILAMENT_INSERT_FLOW]
description: Auto-grab filament and ask for quick load or full purge
gcode:
    SET_TMC_CURRENT STEPPER=extruder CURRENT={printer.configfile.settings['tmc2130 extruder'].hold_current|float}
    M400
    FILAMENT_INSERT_GRAB_MORE

    LED_INFO

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Filament Inserted"
    RESPOND TYPE=command MSG="action:prompt_text Did the extruder grab filament?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Feed +5mm|FILAMENT_INSERT_GRAB_MORE|warning"
    RESPOND TYPE=command MSG="action:prompt_footer_button Grabbed|FILAMENT_INSERT_MODE_PROMPT|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|FILAMENT_INSERT_CANCEL|info"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro FILAMENT_INSERT_CANCEL]
description: Close insert flow prompt
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M117 Load Canceled

    LED_READY


[gcode_macro FILAMENT_INSERT_GRAB_MORE]
description: Feed 5mm to help filament get grabbed
gcode:
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
    M83
    FORCE_MOVE STEPPER=extruder DISTANCE=5 VELOCITY=6.6667 ACCEL=1000
    M400


[gcode_macro FILAMENT_INSERT_MODE_PROMPT]
description: Ask user to choose quick load or full purge
gcode:

    LED_INFO

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Load Mode"
    RESPOND TYPE=command MSG="action:prompt_text Choose load method."
    RESPOND TYPE=command MSG="action:prompt_footer_button Quick Load|FILAMENT_INSERT_QUICK_LOAD|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Full Purge|FILAMENT_INSERT_FULL_PURGE_GATE|warning"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro FILAMENT_INSERT_QUICK_LOAD]
description: Finish insert flow without purge
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M117 Quick Load Complete
    RESPOND MSG="Quick load complete."

    LED_READY


[gcode_macro FILAMENT_INSERT_FULL_PURGE_GATE]
description: Start full purge; wipe only when bed is attached
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    FILAMENT_INSERT_FULL_PURGE {rawparams}


[gcode_macro FILAMENT_INSERT_FULL_PURGE]
description: Heat, purge, and wipe after insert
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

    {% set EXTRUDER_TEMP = params.TEMP|default(240)|int %}
    {% set MIN_TEMP = EXTRUDER_TEMP|float -5 %}
    {% set OOZE_START_TEMP = 170 %}
    {% set CURRENT_TARGET = printer.extruder.target|float %}
    {% set bed_ok = not printer.bed_removal_detector.bedRemoved %}
    {% set HA = printer.toolhead.homed_axes|default("") %}
    {% set z_temp_homed = False %}

    SAVE_GCODE_STATE NAME=FILAMENT_INSERT_FULL_PURGE

    {% if CURRENT_TARGET < EXTRUDER_TEMP %}
        M104 S{EXTRUDER_TEMP}
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_begin Full Purge"
    RESPOND TYPE=command MSG="action:prompt_text Heating hotend."
    RESPOND TYPE=command MSG="action:prompt_show"

    {% if bed_ok %}
        {% if not ('x' in HA and 'y' in HA and 'z' in HA) %}
            G28
        {% endif %}
    {% else %}
        {% if not ('x' in HA and 'y' in HA) %}
            G28 X Y
        {% endif %}
        {% set HA = printer.toolhead.homed_axes|default("") %}
        {% set z_not_homed = not ('z' in HA) %}
        {% if z_not_homed %}
            SET_KINEMATIC_POSITION Z=0 SET_HOMED=Z
            {% set z_temp_homed = True %}
        {% endif %}
    {% endif %}

    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={OOZE_START_TEMP}
    M106 S75

    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={MIN_TEMP}
    RESPOND TYPE=command MSG="action:prompt_end"

    G90
    G1 X200 Y0 F7800
    M400

    M83
    M106 S150
    G4 P2000
    G1 E10 F400
    G1 E8 F1000
    M104 S0
    G1 E60 F600
    M400
    M106 S50
    G1 E-4 F1200
    M400

    {% if bed_ok %}
        NOZZLE_WIPE_SMART MODE=NOHEAT
    {% else %}
        RESPOND MSG="Bed not detected; skipping nozzle wipe."
    {% endif %}

    M107
    G1 X200 Y0 F7800

    {% if z_temp_homed %}
        SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
    {% endif %}

    Z_PARK
    M400



    RESTORE_GCODE_STATE NAME=FILAMENT_INSERT_FULL_PURGE
    M117 Full Purge Complete
    RESPOND MSG="Full purge complete."


    LED_READY


[gcode_macro LOAD_FILAMENT]
description: Backward-compatible alias for FILAMENT_INSERT_FLOW
gcode:
    FILAMENT_INSERT_FLOW {rawparams}

[gcode_macro LOAD_FILAMENT_PROMPT]
description: Backward-compatible alias for FILAMENT_INSERT_FLOW
gcode:
    FILAMENT_INSERT_FLOW {rawparams}

[gcode_macro _FILAMENT_GRAB_MORE]
description: Backward-compatible alias for FILAMENT_INSERT_GRAB_MORE
gcode:
    FILAMENT_INSERT_GRAB_MORE

[gcode_macro _LOAD_FILAMENT_MORE]
description: Backward-compatible alias for FILAMENT_INSERT_GRAB_MORE
gcode:
    FILAMENT_INSERT_GRAB_MORE

[gcode_macro _FILAMENT_LOAD_MODE_PROMPT]
description: Backward-compatible alias for FILAMENT_INSERT_MODE_PROMPT
gcode:
    FILAMENT_INSERT_MODE_PROMPT

[gcode_macro _FILAMENT_QUICK_LOAD]
description: Backward-compatible alias for FILAMENT_INSERT_QUICK_LOAD
gcode:
    FILAMENT_INSERT_QUICK_LOAD

[gcode_macro _FILAMENT_FULL_PURGE_GATE]
description: Backward-compatible alias for FILAMENT_INSERT_FULL_PURGE_GATE
gcode:
    FILAMENT_INSERT_FULL_PURGE_GATE {rawparams}

[gcode_macro _FILAMENT_FULL_PURGE]
description: Backward-compatible alias for FILAMENT_INSERT_FULL_PURGE
gcode:
    FILAMENT_INSERT_FULL_PURGE {rawparams}

[gcode_macro _LOAD_FILAMENT_EXTRUDE]
description: Backward-compatible alias for FILAMENT_INSERT_FULL_PURGE
gcode:
    FILAMENT_INSERT_FULL_PURGE {rawparams}

#Credit to Kalico for this
[gcode_macro _SET_MPC_MATERIAL]
description: Set heater MPC parameters for a given material
variable_filament_table:
    ## Update this table to adjust material settings
    {
        ## ( density, heat capacity )  # suggested heat capacity range
        "PLA"       : ( 1.25, 2.20 ),  # 1.80 - 2.20
        "PETG"      : ( 1.27, 2.20 ),  # 1.70 - 2.20
        "PC+ABS"    : ( 1.15, 2.20 ),  # 1.50 - 2.20
        "ABS"       : ( 1.06, 2.40 ),  # 1.25 - 2.40
        "ASA"       : ( 1.07, 2.10 ),  # 1.30 - 2.10
        "PA6"       : ( 1.12, 2.50 ),  # 2.00 - 2.50
        "PA"        : ( 1.15, 2.50 ),  # 2.00 - 2.50
        "PC"        : ( 1.20, 1.90 ),  # 1.10 - 1.90
        "TPU"       : ( 1.21, 2.00 ),  # 1.50 - 2.00
        "TPU-90A"   : ( 1.15, 2.00 ),  # 1.50 - 2.00
        "TPU-95A"   : ( 1.22, 2.00 ),  # 1.50 - 2.00
        "ABS-CF"    : ( 1.11, 2.40 ),  # 1.25 - 2.40
        "ASA-CF"    : ( 1.11, 2.10 ),  # 1.30 - 2.10
        "PA6-CF"    : ( 1.19, 2.50 ),  # 2.00 - 2.50
        "PC+ABS-CF" : ( 1.22, 2.20 ),  # 1.50 - 2.20
        "PC+CF"     : ( 1.36, 1.90 ),  # 1.10 - 1.90
        "PLA-CF"    : ( 1.29, 2.20 ),  # 1.80 - 2.20
        "PETG-CF"   : ( 1.30, 2.20 ),  # 1.70 - 2.20
    }
gcode:
    {% set material = params.MATERIAL | upper %}
    {% set heater = params.HEATER | default('extruder') %}
    {% set extruder_config = printer.configfile.settings[heater] %}

    {% if material in filament_table %}
        {% set (density, heat_capacity) = filament_table[material] %}

        RESPOND PREFIX=🔥 MSG="Configured {heater} MPC for {material}. Density: {density}, Heat Capacity: {heat_capacity}"
    {% else %}
        {% set density = extruder_config.filament_density %}
        {% set heat_capacity=extruder_config.filament_heat_capacity %}

        RESPOND PREFIX=🔥 MSG="Unknown material '{material}', using default mpc parameters for {heater}"
    {% endif %}

    MPC_SET HEATER={heater} FILAMENT_DENSITY={density} FILAMENT_HEAT_CAPACITY={heat_capacity}


[gcode_macro INSERT_FILAMENT_SENSOR]
description: Trigger insert flow when printer is idle or paused
gcode:
    {% set is_printing = (printer.idle_timeout.state == "Printing")
                    or (printer.print_stats.state|default("")|lower == "printing") %}
    {% set is_paused = printer.pause_resume.is_paused|default(False) %}

    {% if not is_printing or is_paused %}
        FILAMENT_INSERT_FLOW
    {% endif %}


[gcode_macro CUT_FILAMENT]
description: Move to cutter and perform filament cut sweep
variable_move_speed: 7800
variable_cut_speed: 1200
gcode:
    {% set move_speed = params.MOVE_SPEED|default(printer["gcode_macro CUT_FILAMENT"].move_speed)|float %}
    {% set cut_speed = params.CUT_SPEED|default(printer["gcode_macro CUT_FILAMENT"].cut_speed)|float %}
    {% set quarter_move_speed = move_speed / 4.0 %}
    {% set HA = printer.toolhead.homed_axes|default("") %}

    SAVE_GCODE_STATE NAME=CUT_FILAMENT_STATE

    {% if not ('x' in HA and 'y' in HA) %}
        G28 X Y
    {% endif %}

    {% set z_not_homed = 'x' in HA %}
    {% if z_not_homed %}
        SET_KINEMATIC_POSITION Z=0 SET_HOMED=Z
    {% endif %}

    G90
    {% if printer.toolhead.position.y|float < 10 %}
        G1 Y10 F{move_speed}
    {% endif %}

    G1 X116 F{move_speed}

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.6
    #move all the way back, right to the very back
    # G1 Y-3 F{move_speed}
    AXIS_HOME_MOVE AXIS=Y DIR=MIN SPEED=60 RETRACT=0 OVERSHOOT=8

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.5
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.5

    G1 X138 F{cut_speed}
    G1 X126 F{move_speed}
    G1 X108 F{quarter_move_speed}
    G1 X116 F{move_speed}
    G1 Y10 F{move_speed}

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.configfile.settings['tmc2130 stepper_x'].run_current|float}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.configfile.settings['tmc2130 stepper_y'].run_current|float}

    {% if z_not_homed %}
        SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
    {% endif %}

    PARK_PRINTER

    RESTORE_GCODE_STATE NAME=CUT_FILAMENT_STATE
