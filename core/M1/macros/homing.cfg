#####################################################################
#   Homing Macros
#####################################################################

[force_move]
enable_force_move: true


### LOAD CELL HOMING PROCEDURE
#https://www.klipper3d.org/Load_Cell.html#homing-macros

[homing_override]
gcode:
  _LOAD_CELL_HOME_Z
axes: z

[gcode_macro _HOME_Z_FROM_LAST_PROBE]
gcode:
    {% set z_probed = printer.probe.last_probe_position.z %}
    {% set z_position = printer.toolhead.position[2] %}
    {% set z_actual = z_position - z_probed %}
    SET_KINEMATIC_POSITION Z={z_actual}

[gcode_macro _LOAD_CELL_HOME_Z]
gcode:
    SET_GCODE_OFFSET Z=0  # load cell probes dont need a Z offset
    # position toolhead for homing Z, edit for your printers size
    #G90  # absolute move
    #G1 Y50 X50 F{5 * 60}  # move to X/Y position for homing

    # soft home the z axis to its limit so it can be moved:
    SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum[2]}

    # Fast approach and tap
    LOAD_CELL_TARE
    PROBE PROBE_SPEED=15 LIFT_SPEED=10 SAMPLES=1
    _HOME_Z_FROM_LAST_PROBE

    # lift z to 1mm
    G91  # relative move
    G1 Z1 F{10 * 60}

    # # probe at standard speed
    PROBE
    _HOME_Z_FROM_LAST_PROBE

    # lift z to 10mm for clearance
    G91  # relative move
    G1 Z10 F{10 * 60}






# Cancel and close any open prompt
[gcode_macro CANCEL_AND_CLOSE]
gcode:
  CANCEL_PRINT
  RESPOND TYPE=command MSG="action:prompt_end"

# ---------- Unified gate for Z homing ----------
[gcode_macro HOMING_GATE]
description: Block Z homing until toolhead + bed OK; shows modal
gcode:
  RESPOND TYPE=command MSG=action:prompt_end

  {% set toolhead_ok = not printer['mcu toolhead'].disconnected %}
  {% set bed_ok = not printer.bed_removal_detector.bedRemoved %}

  {% if not toolhead_ok or not bed_ok %}
    M117 Homing blocked
    RESPOND TYPE=command MSG="action:prompt_begin Homing blocked"
    {% if not toolhead_ok %} RESPOND TYPE=command MSG="action:prompt_text • Connect the toolhead umbilical" {% endif %}
    {% if not bed_ok %}     RESPOND TYPE=command MSG="action:prompt_text • Re-attach the bed"                 {% endif %}
    RESPOND TYPE=command MSG="action:prompt_footer_button CONTINUE|HOMING_GATE CALLBACK={params.CALLBACK}|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button CANCEL|CANCEL_AND_CLOSE|error"
    RESPOND TYPE=command MSG="action:prompt_show"
  {% else %}
    {params.CALLBACK}
  {% endif %}

# ---------- G28 orchestrator ----------
[gcode_macro G28]
rename_existing: G28.1
variable_z_lifted_once: 0
description: Homing with single Z-lift + hardcoded Z gate
gcode:
  {% set RP = rawparams|default("")|upper %}
  {% set rq_all = ('X' not in RP and 'Y' not in RP and 'Z' not in RP) %}
  {% set rq_x = 'X' in RP %}
  {% set rq_y = 'Y' in RP %}
  {% set rq_z = 'Z' in RP %}
  {% set OPT  = 'O' in RP %}

  {% set HA = printer.toolhead.homed_axes|default("") %}
  {% set home_x = (rq_all or rq_x) and not (OPT and ('x' in HA)) %}
  {% set home_y = (rq_all or rq_y) and not (OPT and ('y' in HA)) %}
  {% set home_z = (rq_all or rq_z) and not (OPT and ('z' in HA)) %}

  # default: proceed with homing
  {% set proceed = 1 %}

  # If Z is requested, hard-gate before any moves (toolhead + bed)
  {% if home_z %}
    {% set toolhead_ok = not printer['mcu toolhead'].disconnected %}
    {% set bed_ok = not printer.bed_removal_detector.bedRemoved %}
    {% if not (toolhead_ok and bed_ok) %}
      HOMING_GATE CALLBACK="G28 {rawparams}"
      {% set proceed = 0 %}
    {% endif %}
  {% endif %}

  {% if proceed %}
    # One-time Z lift per G28 call (after gate success, if any)
    {% set lift_dist = 10|float %}
    {% set z_homed  = 'z' in HA %}
    {% set z_pos    = printer.toolhead.position.z|float %}
    {% set any_home = (home_x or home_y or home_z) %}

    {% if (printer["gcode_macro G28"].z_lifted_once|int == 0 and any_home)
          or (any_home and z_homed and (z_pos < lift_dist)) %}
      #FORCE_MOVE STEPPER=stepper_z DISTANCE={lift_dist} VELOCITY=20 ACCEL=100
      SET_KINEMATIC_POSITION Z=100 SET_HOMED=Z
      AXIS_PROTECTED_MOVE AXIS=Z DIST={lift_dist}      
      SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
      SET_GCODE_VARIABLE MACRO=G28 VARIABLE=z_lifted_once VALUE=1
    {% endif %}

    # Homing sequence
    {% if home_y %} _HOME_Y {% endif %}
    {% if home_x %} _HOME_X {% endif %}
    {% if home_z %} _HOME_Z PARK={params.PARK|default(True)} {% endif %}

    # Reset the one-time flag after homing work is done
    {% if home_x or home_y or home_z %}
      SET_GCODE_VARIABLE MACRO=G28 VARIABLE=z_lifted_once VALUE=0
    {% endif %}
  {% endif %}


# ---------- Axis helpers (kept straightforward) ----------
[gcode_macro _HOME_X]
gcode:
  SAVE_GCODE_STATE NAME=STATE_HOME_X
  # First, move y back to make sure we dont colide with the fillament cutter arm.
  {% set y_homed = ("y" in printer.toolhead.homed_axes) %}
  {% set x_homed = ("x" in printer.toolhead.homed_axes) %}
  {% set z_homed = ("z" in printer.toolhead.homed_axes) %}
  {% if not y_homed %}
    SET_KINEMATIC_POSITION Y=100 X=5 SET_HOMED=YX
  {% endif %}
  {% if not x_homed %}
    SET_KINEMATIC_POSITION X=5 SET_HOMED=X
  {% endif %}
  {% if not z_homed %}
      SET_KINEMATIC_POSITION SET_HOMED=Z
  {% endif %}

  {% if y_homed %}
    {% set y_pos = printer.toolhead.position.y %}
    {action_respond_info("Y position: %.3f" % y_pos)}
    {% if y_pos <= 10 %}
      G90
      G1 Y10 F4800
    {% elif y_pos >= 20 %}
      #prevent x having to home right at the end where pulleys can rub
      G91
      G1 Y-10 F4800
    {% endif %}
  {% else %}
    G91
    G1 Y10 F4800
  {% endif %}

  G91
  G1 x-5 F4800
  M400

  {% if not y_homed %}
    SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=YX
  {% endif %}
  {% if not x_homed %}
    SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=X
  {% endif %}
  {% if not z_homed %}
      SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
  {% endif %}

  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.6
  G28.1 X


  RESTORE_GCODE_STATE NAME=STATE_HOME_X
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.configfile.settings['tmc2130 stepper_x'].run_current|float}
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.configfile.settings['tmc2130 stepper_y'].run_current|float}

[gcode_macro _HOME_Y]
gcode:
  SAVE_GCODE_STATE NAME=STATE_HOME_Y

    {% set y_homed = ("y" in printer.toolhead.homed_axes) %}
  {% set x_homed = ("x" in printer.toolhead.homed_axes) %}
  {% set z_homed = ("z" in printer.toolhead.homed_axes) %}
  {% if not y_homed %}
    SET_KINEMATIC_POSITION Y=100 SET_HOMED=Y
  {% endif %}
  {% if not x_homed %}
    SET_KINEMATIC_POSITION X=5 SET_HOMED=X
  {% endif %}
  {% if not z_homed %}
      SET_KINEMATIC_POSITION SET_HOMED=Z
  {% endif %}

  G91
  # G1 y-5 F4800
  AXIS_PROTECTED_MOVE AXIS=Y DIST=-5 SPEED=60     

  M400

  {% if not y_homed %}
    SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Y
  {% endif %}
  {% if not x_homed %}
    SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=X
  {% endif %}
  {% if not z_homed %}
      SET_KINEMATIC_POSITION SET_HOMED= CLEAR_HOMED=Z
  {% endif %}


  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.6
  G28.1 Y
  RESTORE_GCODE_STATE NAME=STATE_HOME_Y
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.configfile.settings['tmc2130 stepper_x'].run_current|float}
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.configfile.settings['tmc2130 stepper_y'].run_current|float}

[gcode_macro _HOME_Z]
gcode:
  SAVE_GCODE_STATE NAME=STATE_HOME_Z
  SET_KINEMATIC_POSITION SET_HOMED=Z
  G90
  G0 X100 Y60 F7800
  M400
  G28.1 Z
  G0 Z10 F7800
  G90
  {% if params.PARK|default(True) %} G0 X200 Y0 F7800 {% endif %}
  M400
  RESTORE_GCODE_STATE NAME=STATE_HOME_Z

# Convenience alias: conditional home
[gcode_macro CHOME]
gcode:
  G28 O
