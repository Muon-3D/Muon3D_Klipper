# Test config for extruder_homing
[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 33.5
nozzle_diameter: 0.500
filament_diameter: 3.500
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 210

[tmc2130 extruder]
cs_pin: PG0
run_current: .5
sense_resistor: 0.220
diag1_pin: !PK2

[extruder_homing sensorless]
extruder: extruder
endstop_pin: tmc2130_extruder:virtual_endstop
velocity: 5
accel: 50
min_extrude_temp_override: 0

[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[gcode_macro CHECK_EXTRUDER_HOMING_STATUS]
gcode:
  {% set status = printer["extruder_homing sensorless"] %}
  {% if (status.last_requested_distance - 7.0)|abs > 0.000001 %}
    M112
  {% endif %}
  {% if status.last_move_distance < 6.99 %}
    M112
  {% endif %}
  {% if status.last_triggered %}
    M112
  {% endif %}
  {% if status.position|abs > 0.000001 %}
    M112
  {% endif %}
  { action_respond_info("CHECK_EXTRUDER_HOMING_STATUS") }
